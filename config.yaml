ollama_base_url: "http://localhost:11434/v1"
# Per-model call timeout (seconds). Each baseline + committee model gets this
# budget individually — not shared. With 2 committee models + baseline running
# sequentially, expect ~5–12 min total wall time on 8GB RAM with 3 committee models.
time_budget_seconds: 300
# Ollama queues parallel requests; set true to run committee models concurrently.
committee_parallel: true
models:
  - name: "gemma4:e2b"
    role: "general-reasoning"
  - name: "qwen2.5-coder:3b"
    role: "coder"
  - name: "llama3.2:3b"
    role: "general-reasoning"
baseline_model: "qwen2.5-coder:3b"
# Input to models: "raw" (diff text) or "structured" (Tree-sitter function delta)
input_mode: "raw"
